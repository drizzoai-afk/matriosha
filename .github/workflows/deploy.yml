name: Deploy Matriosha to GCP

on:
  push:
    branches:
      - main  # <--- MANCAVA QUESTO: dice a GitHub di partire quando carichi su 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: matriosha # <--- AGGIUNTO: forza GitHub a usare il progetto v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: matriosha-api
          region: europe-west3
          source: ./
          # Qui usiamo 'matriosha-v2' scritto a mano per bypassare ogni dubbio sui secrets
          env_vars: GCP_PROJECT_ID=matriosha

