name: integration-tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: real-backend-integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: integration
    env:
      MATRIOSHA_TEST_MODE: real
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCA_JSON: ${{ secrets.GCA_JSON }}
      MATRIOSHA_MANAGED_ENDPOINT: ${{ secrets.MATRIOSHA_MANAGED_ENDPOINT }}
      MATRIOSHA_MANAGED_TOKEN: ${{ secrets.MATRIOSHA_MANAGED_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare GCP credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/matriosha"
          printf '%s' "$GCA_JSON" > "$HOME/.config/matriosha/gca.json"
          printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa-key.json" >> "$GITHUB_ENV"

      - name: Run real backend integration tests
        shell: bash
        run: |
          set -euo pipefail
          pytest \
            tests/integration/test_local_happy_path.py \
            tests/integration/test_managed_sync_basic.py \
            tests/integration/test_integrity_corruption.py \
            tests/integration/test_semantic_extraction.py \
            --real-backend

      - name: Credential cleanup
        if: always()
        shell: bash
        run: |
          rm -f "$HOME/.config/matriosha/gca.json" "$RUNNER_TEMP/gcp-sa-key.json"
