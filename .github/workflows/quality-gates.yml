name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check pyproject.toml tests/test_cmd_billing.py tests/test_legacy_command_cleanup.py scripts/verify_test_evidence.py

      - name: Type-check package with mypy
        run: mypy src/matriosha

      - name: Run unit and non-managed integration tests with coverage
        run: |
          pytest \
            --cov=matriosha \
            --cov-report=term-missing \
            --cov-fail-under=57 \
            -m "not managed"

      - name: Validate visual evidence manifest completeness
        run: python scripts/verify_test_evidence.py

      - name: Run visual regression and adversarial integration suite
        run: |
          pytest \
            tests/integration/test_visual_verification.py \
            tests/integration/test_adversarial_suite.py

      - name: Security scan with Bandit
        run: bandit -q -r src/matriosha

      - name: Dependency vulnerability audit
        run: pip-audit
