name: quality-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  visual-and-adversarial-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate visual evidence manifest completeness
        run: python scripts/verify_test_evidence.py

      - name: Run visual regression + adversarial integration suite
        run: |
          pytest \
            tests/integration/test_visual_verification.py \
            tests/integration/test_adversarial_suite.py
