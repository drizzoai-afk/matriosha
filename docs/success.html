<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment successful — Matriosha</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #090807;
      --card: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.14);
      --text: #fff7ec;
      --muted: #d5bda2;
      --accent: #ffb062;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,176,98,.22), transparent 34%),
        radial-gradient(circle at 80% 90%, rgba(255,82,124,.14), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 58px);
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 90px rgba(0,0,0,.25);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(36px, 7vw, 68px);
      line-height: .95;
      letter-spacing: -.06em;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    code {
      padding: 3px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: var(--text);
    }

    a {
      display: inline-flex;
      margin-top: 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #221204;
      padding: 12px 18px;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Payment successful</p>
    <h1>You’re ready to use Managed Mode.</h1>
    <p>
      Your Matriosha subscription was created successfully.
      You can now return to the CLI and continue the managed setup flow.
    </p>
    <p>
      If needed, run <code>matriosha mode set managed</code> from your terminal.
    </p>
    <a href="/">Back to Matriosha</a>
  </main>
</body>
</html>
